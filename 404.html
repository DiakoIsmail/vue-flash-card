<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vue Flashcard</title>
    <script>
      // Redirect to index.html preserving the path as a query param
      var path = window.location.pathname.replace(/\/vue-flash-card/, '');
      window.location.replace(
        '/vue-flash-card/?p=' + encodeURIComponent(path) + window.location.search
      );
    </script>
  </head>
  <body></body>
</html>
